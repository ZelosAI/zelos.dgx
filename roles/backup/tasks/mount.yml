---
- name: Ensure mount point exists
  ansible.builtin.file:
    path: "{{ backup_mount_point }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Write SMB credentials file (smb mode only)
  ansible.builtin.template:
    src: borg-smb-credentials.j2
    dest: "{{ backup_smb_credentials_file }}"
    owner: root
    group: root
    mode: '0600'
  when: backup_repo_mode == 'smb'
  no_log: true

- name: Persistently mount the NFS share
  ansible.posix.mount:
    path: "{{ backup_mount_point }}"
    src: "{{ backup_nfs_share }}"
    fstype: nfs4
    opts: "{{ backup_nfs_options }}"
    state: mounted
  when: backup_repo_mode == 'nfs'

- name: Persistently mount the SMB share
  ansible.posix.mount:
    path: "{{ backup_mount_point }}"
    src: "{{ backup_smb_share }}"
    fstype: cifs
    opts: "{{ backup_smb_options }},credentials={{ backup_smb_credentials_file }}"
    state: mounted
  when: backup_repo_mode == 'smb'
