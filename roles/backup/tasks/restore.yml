---
- name: Assert backup_archive is set
  ansible.builtin.assert:
    that:
      - backup_archive | length > 0
    fail_msg: >-
      backup_archive must name an archive in the repo (see `borg list`).
      Pass it via -e backup_archive=<name>.

- name: Compute effective repo path (restore)
  ansible.builtin.set_fact:
    backup_repo_effective: >-
      {%- if backup_repo_mode in ['nfs', 'smb'] -%}
      {{ backup_mount_point }}/{{ inventory_hostname }}{%- elif backup_repo_mode == 'local' and backup_repo | length == 0 -%}
      /var/backup/borg/{{ inventory_hostname }}{%- else -%}
      {{ backup_repo }}{%- endif -%}

- name: Ensure the share is mounted (nfs/smb restore)
  ansible.builtin.import_tasks: mount.yml
  when: backup_repo_mode in ['nfs', 'smb']

- name: Create restore target directory
  ansible.builtin.file:
    path: "{{ backup_restore_target }}/{{ backup_archive }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Extract archive into restore target
  ansible.builtin.command:
    argv:
      - borg
      - extract
      - "{{ backup_repo_effective }}::{{ backup_archive }}"
    chdir: "{{ backup_restore_target }}/{{ backup_archive }}"
  environment:
    BORG_PASSPHRASE: "{{ vault_borg_passphrase | default('') }}"
  register: backup_extract
  changed_when: true
  no_log: true

- name: Restore complete
  ansible.builtin.debug:
    msg: >-
      Archive {{ backup_archive }} extracted to
      {{ backup_restore_target }}/{{ backup_archive }}.
      Files are NOT installed in place — inspect, then copy in by hand.
