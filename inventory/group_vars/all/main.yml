---
# Core tuning knobs for the zelos.dgx collection.
# Vault secrets live alongside this file in vault.yml (gitignored).

# --- Bootstrap (one-time, before this file is even relevant) ---
# Set in inventory/bootstrap.yml when running `make bootstrap`.
bootstrap_user: ansible
# bootstrap_authorized_keys_file: "~/.ssh/id_ed25519.pub"   # control node

# --- NVIDIA / driver ---
nvidia_verify_min_driver: "550"

# --- Docker / NVIDIA container toolkit ---
docker_users:
  - ansible
  - ubuntu
docker_default_runtime: nvidia
docker_smoke_image: nvidia/cuda:12.4.1-base-ubuntu22.04

# --- Tailscale ---
tailscale_ssh: true
tailscale_advertise_routes: []
tailscale_extra_args: []

# --- Virtual display ---
virtual_display_width: 3840
virtual_display_height: 2160
virtual_display_refresh: 60
virtual_display_busid: ""   # autodetect if empty; e.g. "PCI:1:0:0"

# --- Sunshine ---
# The X session lives under this user. Keep this aligned with whatever
# account you actually log into for desktop use.
sunshine_user: ubuntu
sunshine_version: "0.23.1"

# --- Snapshot (timeshift, pre-site rollback) ---
snapshot_enabled: true
snapshot_comment: "ansible-pre-site"
snapshot_tag: "D"
snapshot_excludes:
  - "/opt/vllm/hf-cache/**"
  - "/var/lib/docker/**"
  - "/var/lib/rancher/k3s/agent/containerd/**"
snapshot_retention:
  daily: 5
  weekly: 2
  monthly: 1
  boot: 5

# --- Backup (borg, daily off-host) ---
# Pick one repo mode. ssh is the simplest off-host option.
backup_repo_mode: ssh                # ssh | local | nfs | smb
backup_repo: ""                      # ssh: "user@host:/path/<hostname>"
backup_mount_point: /mnt/borg-repo

# NFS-mode inputs
backup_nfs_share: ""                 # "nas.tail-net.ts.net:/export/borg"
backup_nfs_options: "rw,hard,vers=4"

# SMB-mode inputs (password is vaulted as vault_borg_smb_password)
backup_smb_share: ""                 # "//nas.tail-net.ts.net/borg"
backup_smb_username: ""
backup_smb_options: "vers=3.0,uid=0,gid=0,file_mode=0600,dir_mode=0700"

backup_encryption: repokey-blake2    # none | repokey-blake2 | keyfile-blake2
backup_compression: "auto,zstd"
backup_schedule: "daily"
backup_schedule_random_delay: "30m"
backup_run_now: false                # flip via -e to trigger an immediate backup
backup_restore_target: "/var/restore"

# --- vLLM ---
vllm_dir: /opt/vllm
vllm_image: vllm/vllm-openai:latest
vllm_model: meta-llama/Meta-Llama-3.1-8B-Instruct
vllm_served_model_name: llama-3.1-8b
vllm_port: 8000
vllm_tensor_parallel_size: 1
vllm_max_model_len: 8192
vllm_gpu_memory_utilization: 0.90
vllm_hf_cache: /opt/vllm/hf-cache
vllm_health_retries: 60
vllm_health_delay: 10

# --- k3s (opt-in) ---
k3s_gpu_install: false
k3s_gpu_operator_install: false
k3s_gpu_version: v1.30.2+k3s1

# --- Monitoring ---
monitoring_bind: 127.0.0.1
monitoring_node_exporter_version: "1.8.1"
monitoring_node_exporter_port: 9100
monitoring_dcgm_exporter_image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.7-3.5.0-ubuntu22.04
monitoring_dcgm_exporter_port: 9400
