---
# Main inventory. Assumes `make bootstrap` has run, creating the `ansible`
# user with key + NOPASSWD sudo. For the one-time first connection,
# see inventory/bootstrap.example.yml.

all:
  children:
    dgx:
      hosts:
        dgx01:
          ansible_host: 10.0.0.10
          ansible_user: ansible
          ansible_become: true
